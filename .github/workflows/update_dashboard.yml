name: Update Freight Dashboard

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: freight-dashboard-gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard HTML
        env:
          EIA_API_KEY: ${{ secrets['EIA_API_KEY'] }}
          OPENWEATHERMAP_API_KEY: ${{ secrets['OPENWEATHERMAP_API_KEY'] }}
        run: |
          python freight_heatmap.py --extras --no-show --no-screenshot --output freight_heatmap.html

          cat > index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Freight Intelligence Dashboard</title>
            <style>
              body { margin: 0; font-family: Arial, sans-serif; }
              h1 { margin: 16px; }
              iframe { border: 0; width: 100%; height: calc(100vh - 64px); }
            </style>
          </head>
          <body>
            <h1>Georgia Freight Heat Map</h1>
            <iframe src="./freight_heatmap.html" title="Freight Heat Map"></iframe>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages branch
        run: |
          rm -rf .pages
          mkdir -p .pages
          cp index.html .pages/index.html
          cp freight_heatmap.html .pages/freight_heatmap.html

          cd .pages
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html freight_heatmap.html
          git commit -m "chore: publish dashboard"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          remote_head=$(git ls-remote --heads origin gh-pages | awk '{print $1}')
          if [ -n "$remote_head" ]; then
            git push --force-with-lease=gh-pages:$remote_head origin gh-pages
          else
            git push origin gh-pages
          fi
